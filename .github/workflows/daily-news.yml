name: Daily News

on:
  schedule:
    - cron: '0 15 * * *'  # UTC 15:00 = Vancouver 8:00 AM → brief
    - cron: '0 23 * * *'  # UTC 23:00 = Vancouver 4:00 PM → full
  workflow_dispatch:
    inputs:
      mode:
        description: 'brief or full'
        default: 'full'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Install edge-tts
        run: pip install edge-tts

      - name: Determine mode
        id: mode
        run: |
          CRON="${{ github.event.schedule }}"
          MANUAL="${{ github.event.inputs.mode }}"
          if [ "$CRON" = "0 15 * * *" ]; then
            echo "flag=--brief" >> $GITHUB_OUTPUT
          elif [ -n "$MANUAL" ] && [ "$MANUAL" = "brief" ]; then
            echo "flag=--brief" >> $GITHUB_OUTPUT
          else
            echo "flag=" >> $GITHUB_OUTPUT
          fi

      - name: Run daily-news
        run: npx tsx daily-news.ts ${{ steps.mode.outputs.flag }}
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: 2045maxyang@gmail.com

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          keep_files: true
